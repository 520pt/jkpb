services:
  duty-reminder:
    build:
      context: .
      args:
        INSTALL_OCR: "${INSTALL_OCR:-false}"
    image: duty-reminder:latest
    container_name: duty-reminder
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      DATA_DIR: "${DATA_DIR:-/app/data}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/uploads}"
      ENABLE_SCHEDULER: "${ENABLE_SCHEDULER:-true}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-10}"
      UPLOAD_KEEP_DAYS: "${UPLOAD_KEEP_DAYS:-90}"
      WECOM_CORP_ID: "${WECOM_CORP_ID:-}"
      WECOM_CORP_SECRET: "${WECOM_CORP_SECRET:-}"
      WECOM_AGENT_ID: "${WECOM_AGENT_ID:-}"
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - duty-data:/app/data
      - duty-uploads:/app/uploads

volumes:
  duty-data:
  duty-uploads:
