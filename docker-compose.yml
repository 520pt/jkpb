services:
  lightagent:
    build:
      context: ./LightAgent
      dockerfile: ../docker/lightagent.Dockerfile
      args:
        INSTALL_LIGHTAGENT_BROWSER: "${INSTALL_LIGHTAGENT_BROWSER:-false}"
        USE_CN_MIRROR: "${USE_CN_MIRROR:-false}"
    image: lightagent:latest
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      LIGHTAGENT_LANG: "${LIGHTAGENT_LANG:-auto}"
      CHANNEL_TYPE: "${LIGHTAGENT_CHANNEL_TYPE:-web,wechat_group}"
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "9899"
      WEB_PASSWORD: "${LIGHTAGENT_WEB_PASSWORD:-520pt}"
      LIGHTAGENT_PUSH_TOKEN: "${LIGHTAGENT_PUSH_TOKEN:-}"
      DUTY_REMINDER_QUERY_URL: "${DUTY_REMINDER_QUERY_URL:-http://duty-reminder:8080/api/wechat-query}"
      DUTY_REMINDER_ROSTER_IMPORT_URL: "${DUTY_REMINDER_ROSTER_IMPORT_URL:-http://duty-reminder:8080/api/wechat-roster/import}"
      DUTY_REMINDER_ROSTER_CONFIRM_URL: "${DUTY_REMINDER_ROSTER_CONFIRM_URL:-http://duty-reminder:8080/api/wechat-roster/confirm}"
      DUTY_REMINDER_QUERY_TOKEN: "${DUTY_REMINDER_QUERY_TOKEN:-520pt}"
      AGENT: "${LIGHTAGENT_AGENT:-true}"
      MODEL: "${LIGHTAGENT_MODEL:-deepseek-v4-flash}"
      DEEPSEEK_API_KEY: "${DEEPSEEK_API_KEY:-}"
      DEEPSEEK_API_BASE: "${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}"
      OPEN_AI_API_KEY: "${OPEN_AI_API_KEY:-}"
      OPEN_AI_API_BASE: "${OPEN_AI_API_BASE:-https://api.openai.com/v1}"
      DASHSCOPE_API_KEY: "${DASHSCOPE_API_KEY:-}"
      ZHIPU_AI_API_KEY: "${ZHIPU_AI_API_KEY:-}"
      MOONSHOT_API_KEY: "${MOONSHOT_API_KEY:-}"
      CLAUDE_API_KEY: "${CLAUDE_API_KEY:-}"
      CLAUDE_API_BASE: "${CLAUDE_API_BASE:-https://api.anthropic.com/v1}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_API_BASE: "${GEMINI_API_BASE:-https://generativelanguage.googleapis.com}"
      WECHAT_GROUP_ENABLED: "${WECHAT_GROUP_ENABLED:-true}"
      WECHAT_GROUP_SIDECAR_NODE: "node"
      WECHAT_GROUP_SIDECAR_MEMORY_PATH: "/home/agent/lightagent/wechat_group"
    ports:
      - "${LIGHTAGENT_PORT:-9899}:9899"
    volumes:
      - lightagent-data:/home/agent/lightagent

  duty-reminder:
    build:
      context: .
      args:
        INSTALL_OCR: "${INSTALL_OCR:-false}"
    image: duty-reminder:latest
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      DATA_DIR: "${DATA_DIR:-/app/data}"
      UPLOAD_DIR: "${UPLOAD_DIR:-/app/uploads}"
      ENABLE_SCHEDULER: "${ENABLE_SCHEDULER:-true}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      MAX_UPLOAD_MB: "${MAX_UPLOAD_MB:-10}"
      UPLOAD_KEEP_DAYS: "${UPLOAD_KEEP_DAYS:-90}"
      NOTIFICATION_SENDER_TYPE: "${NOTIFICATION_SENDER_TYPE:-lightagent}"
      LIGHTAGENT_NOTIFY_URL: "${LIGHTAGENT_NOTIFY_URL:-http://lightagent:9899/api/push/send}"
      LIGHTAGENT_WEB_URL: "${LIGHTAGENT_WEB_URL:-http://lightagent:9899}"
      LIGHTAGENT_WEB_PASSWORD: "${LIGHTAGENT_WEB_PASSWORD:-520pt}"
      LIGHTAGENT_PUSH_TOKEN: "${LIGHTAGENT_PUSH_TOKEN:-}"
      LIGHTAGENT_NOTIFY_TARGET: "${LIGHTAGENT_NOTIFY_TARGET:-}"
      DUTY_REMINDER_QUERY_TOKEN: "${DUTY_REMINDER_QUERY_TOKEN:-520pt}"
      WECOM_CORP_ID: "${WECOM_CORP_ID:-}"
      WECOM_CORP_SECRET: "${WECOM_CORP_SECRET:-}"
      WECOM_AGENT_ID: "${WECOM_AGENT_ID:-}"
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - duty-data:/app/data
      - duty-uploads:/app/uploads
    depends_on:
      - lightagent

volumes:
  lightagent-data:
  duty-data:
  duty-uploads:
