services:
  # duty-reminder：后台页面、提醒配置、图片生成、隧道机电查询、内置个人微信群通知。
  duty-reminder:
    image: ghcr.io/520pt/jkpb:latest
    container_name: duty-reminder
    restart: unless-stopped
    ports:
      # 后台端口，浏览器访问 http://服务器IP:2222
      - "2222:8080"
    environment:
      # 后台登录账号和密码。
      ADMIN_USERNAME: 520pt
      ADMIN_PASSWORD: 520pt

      # 启用内置个人微信群桥，不需要再单独部署 LightAgent。
      WECHAT_BRIDGE_ENABLED: "true"

      # 微信登录态、群映射、成员映射保存目录。
      WECHAT_BRIDGE_DATA_DIR: /app/wechat

      # 微信查询接口内部 token，默认即可；只要不要暴露给外部即可。
      DUTY_REMINDER_QUERY_TOKEN: 520pt
    volumes:
      # 保存数据库、提醒配置、排班数据、隧道机电配置。
      - ./data:/app/data

      # 保存上传文件和生成的提醒图片；项目会按默认保留天数自动清理旧图片。
      - ./uploads:/app/uploads

      # 保存个人微信扫码登录状态、群 ID 映射、成员 ID 映射。
      - ./wechat:/app/wechat
