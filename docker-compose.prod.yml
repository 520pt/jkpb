services:
  duty-reminder:
    image: ghcr.io/520pt/jkpb:latest
    container_name: duty-reminder
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
      ENABLE_SCHEDULER: "true"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: CHANGE_THIS_PASSWORD
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
