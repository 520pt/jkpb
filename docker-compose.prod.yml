services:
  lightagent:
    image: ghcr.io/520pt/jkpb-lightagent:latest
    container_name: lightagent
    restart: unless-stopped
    ports:
      - "9899:9899"
    environment:
      TZ: Asia/Shanghai
      LIGHTAGENT_LANG: auto
      CHANNEL_TYPE: web,wechat_group
      WEB_HOST: 0.0.0.0
      WEB_PORT: "9899"
      WEB_PASSWORD: 520pt
      LIGHTAGENT_PUSH_TOKEN: 520pt
      DUTY_REMINDER_BASE_URL: http://duty-reminder:8080
      DUTY_REMINDER_QUERY_TOKEN: 520pt
      AGENT: "true"
      MODEL: deepseek-v4-flash
      DEEPSEEK_API_KEY: ""
      DEEPSEEK_API_BASE: https://api.deepseek.com/v1
      WECHAT_GROUP_ENABLED: "true"
      WECHAT_GROUP_SIDECAR_NODE: node
      WECHAT_GROUP_SIDECAR_MEMORY_PATH: /home/agent/lightagent/wechat_group
    volumes:
      - ./lightagent:/home/agent/lightagent

  duty-reminder:
    image: ghcr.io/520pt/jkpb:latest
    container_name: duty-reminder
    restart: unless-stopped
    ports:
      - "2222:8080"
    environment:
      TZ: Asia/Shanghai
      ENABLE_SCHEDULER: "true"
      ADMIN_USERNAME: 520pt
      ADMIN_PASSWORD: 520pt
      NOTIFICATION_SENDER_TYPE: lightagent
      LIGHTAGENT_BASE_URL: http://lightagent:9899
      LIGHTAGENT_WEB_PASSWORD: 520pt
      LIGHTAGENT_PUSH_TOKEN: 520pt
      DUTY_REMINDER_QUERY_TOKEN: 520pt
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    depends_on:
      - lightagent
