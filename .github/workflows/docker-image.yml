name: Build Docker Image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/520pt/jkpb
  LIGHTAGENT_IMAGE_NAME: ghcr.io/520pt/jkpb-lightagent

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          python -m compileall app
          python -m pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract duty-reminder Docker metadata
        id: meta-duty
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push duty-reminder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            INSTALL_OCR=false
          tags: ${{ steps.meta-duty.outputs.tags }}
          labels: ${{ steps.meta-duty.outputs.labels }}
          cache-from: type=gha,scope=duty-reminder
          cache-to: type=gha,mode=max,scope=duty-reminder

      - name: Extract LightAgent Docker metadata
        id: meta-lightagent
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.LIGHTAGENT_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push LightAgent
        uses: docker/build-push-action@v6
        with:
          context: LightAgent
          file: docker/lightagent.Dockerfile
          push: true
          build-args: |
            INSTALL_LIGHTAGENT_BROWSER=false
            USE_CN_MIRROR=false
          tags: ${{ steps.meta-lightagent.outputs.tags }}
          labels: ${{ steps.meta-lightagent.outputs.labels }}
          cache-from: type=gha,scope=lightagent
          cache-to: type=gha,mode=max,scope=lightagent
